kind: ConfigMap
metadata:
  name: libvirt-libvirt-default-bin
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  annotations:
    openstackhelm.openstack.org/release_uuid: ""
  labels:
    app.kubernetes.io/component: libvirt
    app.kubernetes.io/instance: libvirt
    app.kubernetes.io/name: libvirt
    application: libvirt
    component: libvirt
    release_group: libvirt
  name: libvirt-libvirt-default
spec:
  minReadySeconds: 0
  selector:
    matchLabels:
      app.kubernetes.io/component: libvirt
      app.kubernetes.io/instance: libvirt
      app.kubernetes.io/name: libvirt
      application: libvirt
      component: libvirt
      release_group: libvirt
  template:
    metadata:
      annotations:
        configmap-bin-hash: 5fccaaa328cc462c9988d0947d08040ca8e9af4c76d4f72f8ccd859d222c73ec
        configmap-etc-hash: c28e65cdca6dba2e1cb4ba5d24f858f9aa4ff86afc611628f9d0445d2098faf4
        openstackhelm.openstack.org/release_uuid: ""
      labels:
        app.kubernetes.io/component: libvirt
        app.kubernetes.io/instance: libvirt
        app.kubernetes.io/name: libvirt
        application: libvirt
        component: libvirt
        release_group: libvirt
    spec:
      containers:
      - command:
        - /tmp/libvirt.sh
        env:
        - name: CEPH_CINDER_USER
          value: cinder
        - name: LIBVIRT_CEPH_CINDER_SECRET_UUID
          value: 457eb676-33da-42ec-9a8c-9293d545c337
        image: quay.io/airshipit/libvirt:2025.2-ubuntu_noble
        imagePullPolicy: IfNotPresent
        lifecycle:
          preStop:
            exec:
              command:
              - bash
              - -c
              - kill $(cat /var/run/libvirtd.pid)
        livenessProbe:
          exec:
            command:
            - bash
            - -c
            - /usr/bin/virsh connect
          initialDelaySeconds: 30
          periodSeconds: 60
          timeoutSeconds: 5
        name: libvirt
        readinessProbe:
          exec:
            command:
            - bash
            - -c
            - /usr/bin/virsh connect
          initialDelaySeconds: 15
          periodSeconds: 60
          timeoutSeconds: 5
        securityContext:
          privileged: true
          readOnlyRootFilesystem: false
        volumeMounts:
        - mountPath: /tmp
          name: pod-tmp
        - mountPath: /tmp/libvirt.sh
          name: libvirt-bin
          readOnly: true
          subPath: libvirt.sh
        - mountPath: /etc/libvirt/libvirtd.conf
          name: pod-shared
          readOnly: true
          subPath: libvirtd.conf
        - mountPath: /etc/libvirt/qemu.conf
          name: libvirt-etc
          readOnly: true
          subPath: qemu.conf
        - mountPath: /etc/libvirt/qemu
          name: etc-libvirt-qemu
        - mountPath: /lib/modules
          name: libmodules
          readOnly: true
        - mountPath: /var/lib/libvirt
          mountPropagation: Bidirectional
          name: var-lib-libvirt
        - mountPath: /var/lib/nova
          mountPropagation: Bidirectional
          name: var-lib-nova
        - mountPath: /run
          name: run
        - mountPath: /dev
          name: dev
        - mountPath: /sys/fs/cgroup
          name: cgroup
        - mountPath: /var/log/libvirt
          name: logs
        - mountPath: /etc/machine-id
          name: machine-id
          readOnly: true
        - mountPath: /etc/ceph
          mountPropagation: Bidirectional
          name: etcceph
        - mountPath: /tmp/client-keyring
          name: ceph-keyring
          readOnly: true
          subPath: key
      dnsPolicy: ClusterFirstWithHostNet
      hostIPC: true
      hostNetwork: true
      hostPID: true
      initContainers:
      - command:
        - kubernetes-entrypoint
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: INTERFACE_NAME
          value: eth0
        - name: PATH
          value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/
        - name: DEPENDENCY_SERVICE
          value: ""
        - name: DEPENDENCY_DAEMONSET
          value: ""
        - name: DEPENDENCY_CONTAINER
          value: ""
        - name: DEPENDENCY_POD_JSON
          value: '[{"labels":{"application":"neutron","component":"neutron-ovs-agent"},"requireSameNode":true}]'
        - name: DEPENDENCY_CUSTOM_RESOURCE
          value: ""
        image: quay.io/airshipit/kubernetes-entrypoint:latest-ubuntu_jammy
        imagePullPolicy: IfNotPresent
        name: init
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsUser: 65534
        volumeMounts: null
      - command:
        - /tmp/init-dynamic-options.sh
        image: quay.io/airshipit/libvirt:2025.2-ubuntu_noble
        imagePullPolicy: IfNotPresent
        name: init-dynamic-options
        securityContext:
