---
images:
  tags:
    bootstrap: "quay.io/airshipit/openstack-client:2025.2-ubuntu_noble"
    db_init: "quay.io/airshipit/openstack-client:2025.2-ubuntu_noble"
    db_drop: "quay.io/airshipit/openstack-client:2025.2-ubuntu_noble"
    ks_user: "quay.io/airshipit/openstack-client:2025.2-ubuntu_noble"
    ks_service: "quay.io/airshipit/openstack-client:2025.2-ubuntu_noble"
    ks_endpoints: "quay.io/airshipit/openstack-client:2025.2-ubuntu_noble"
    glance_db_sync: "quay.io/airshipit/glance:2025.2-ubuntu_noble"
    glance_api: "quay.io/airshipit/glance:2025.2-ubuntu_noble"
    glance_metadefs_load: "quay.io/airshipit/glance:2025.2-ubuntu_noble"
    glance_storage_init: "quay.io/airshipit/ceph-config-helper:latest-ubuntu_jammy"
manifests:
  network_policy: true
network_policy:
  glance:
    ingress:
      - from:
          - podSelector:
              matchLabels:
                application: glance
          - podSelector:
              matchLabels:
                application: nova
          - podSelector:
              matchLabels:
                application: horizon
          - podSelector:
              matchLabels:
                application: ingress
          - podSelector:
              matchLabels:
                application: heat
          - podSelector:
              matchLabels:
                application: ironic
          - podSelector:
              matchLabels:
                application: cinder
        ports:
          - protocol: TCP
            port: 9292
    egress:
      - to:
        ports:
          - protocol: TCP
            port: 80
          - protocol: TCP
            port: 443
      - to:
          - ipBlock:
              cidr: 1.1.1.1/32
        ports:
          - protocol: TCP
            port: 1234
